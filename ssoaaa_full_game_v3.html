<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>쏴아아아 - 소리를 그려요</title>
<style>
:root{--blue:#72c7ec;--deep:#0d6380;--sky:#dff6ff;--cream:#fffef6;--pink:#ffd7e8;--green:#a8ebce;--orange:#ffd4a8;--purple:#dcd8ff;--ink:#0e6c8e;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{margin:0;height:100%;overflow:hidden;background:var(--sky);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;color:var(--deep);font-weight:900;touch-action:none}
button{font:inherit;border:6px solid var(--blue);background:#fff;color:var(--deep);border-radius:28px;box-shadow:0 8px 0 rgba(28,112,145,.13);cursor:pointer;touch-action:manipulation;user-select:none;min-height:58px} button:active{transform:translateY(3px);box-shadow:0 5px 0 rgba(28,112,145,.13)}
#app{height:100dvh;max-width:920px;margin:0 auto;padding:10px 12px 12px;display:flex;flex-direction:column;gap:8px}.brand{text-align:center;line-height:1.02;flex:0 0 auto}.brand .small{font-size:clamp(20px,4.7vw,36px)}.brand .title{font-size:clamp(42px,9vw,74px);text-shadow:0 10px 0 #fff;letter-spacing:-2px}.screen{display:none;flex:1;min-height:0}.screen.active{display:flex}.center{align-items:center;justify-content:center;flex-direction:column;gap:20px;text-align:center}.sub{font-size:clamp(21px,4.7vw,38px);color:#2b7f99}.bigBtn{font-size:clamp(28px,7vw,56px);width:min(680px,94%);padding:24px 18px}
.topbar{display:grid;grid-template-columns:70px 78px 1fr 78px;gap:8px;align-items:center;flex:0 0 auto}.mini{font-size:30px;padding:4px;border-radius:22px;min-height:62px}.navBtn{font-size:44px;padding:4px;min-height:74px;border-radius:28px}.wordBox{text-align:center;background:#fff;border:7px solid var(--blue);border-radius:30px;padding:8px 6px;font-size:clamp(31px,7vw,58px);line-height:1.12;min-width:0}.malangi{border-color:var(--pink);color:#a63c6b;font-size:clamp(16px,3.5vw,24px);padding:6px 12px;min-height:44px;border-radius:22px;box-shadow:0 6px 0 rgba(160,80,120,.12)}
.panel,.drawPanel{position:relative;flex:1;min-height:0;background:var(--cream);border:8px solid var(--blue);border-radius:42px;overflow:hidden;padding:14px;display:flex;flex-direction:column;align-items:center;text-align:center}.panel{gap:10px}.scene{position:relative;width:100%;flex:1;min-height:230px;border-radius:32px;background:linear-gradient(#f8fdff,#fffef6);overflow:hidden}.desc{font-size:clamp(19px,4.3vw,31px);color:#377f96;line-height:1.25}.sentence{font-size:clamp(23px,5vw,40px);background:#fff;border:5px solid #ccecf8;border-radius:24px;padding:10px 12px;width:96%;line-height:1.22}.readBtn{font-size:clamp(20px,4.4vw,32px);padding:8px 20px}.drawTip{font-size:clamp(16px,3.7vw,26px);color:#6394a3;line-height:1.2}.learnBtns{display:flex;width:100%;gap:8px}.learnBtns button{flex:1;font-size:clamp(20px,4.5vw,33px);padding:8px}
.drawPanel{padding:0}.placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(13,99,128,.15);font-size:clamp(25px,5.6vw,44px);pointer-events:none;z-index:1}canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;z-index:4}.fx{position:absolute;inset:0;pointer-events:none;z-index:3;overflow:hidden}.example{position:absolute;inset:0;background:rgba(255,255,255,.92);z-index:7;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;pointer-events:none}.example.show{display:flex}.example b{font-size:clamp(27px,5.7vw,46px)}.exampleText{font-size:clamp(17px,3.8vw,28px);color:#477f92}.exsvg{width:86%;height:56%;}.toast{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:#fff;border:7px solid var(--pink);border-radius:28px;padding:18px 20px;font-size:clamp(22px,4.8vw,38px);display:none;z-index:10;max-width:85%;line-height:1.25}.toast.show{display:block}.bottomBtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;flex:0 0 auto}.bottomBtns button{font-size:clamp(22px,5vw,36px);padding:10px 5px;min-height:82px;line-height:1.15}.btnOrange{border-color:var(--orange);color:#ad6400}.btnGreen{border-color:var(--green);color:#098759}.btnPurple{border-color:var(--purple);color:#5f5aa6}
/* Detailed learn SVG helpers */
.scene svg{width:100%;height:100%;display:block}.rainLine{animation:rainFall .75s linear infinite}.rainLine:nth-child(odd){animation-duration:.95s}.cloudBob{animation:bob 2s ease-in-out infinite}.slideWater{animation:slideDown 2.2s linear infinite}.streamMove{animation:streamMove 1.7s ease-in-out infinite}.dropFall{animation:dropFall 1.4s ease-in infinite}.bounceDrop{animation:bounce 1.2s ease-in-out infinite}.rippleAnim{animation:rippleSvg 1.6s ease-out infinite}.waveMove{animation:waveMove 1.6s ease-in-out infinite}.splashRay{animation:splashRay 1.1s ease-out infinite;transform-origin:center bottom}@keyframes rainFall{from{transform:translateY(-70px)}to{transform:translateY(230px)}}@keyframes bob{50%{transform:translateY(8px)}}@keyframes slideDown{from{transform:translateY(-150px)}to{transform:translateY(250px)}}@keyframes streamMove{50%{transform:translateX(16px)}}@keyframes dropFall{0%{transform:translateY(-40px);opacity:0}20%{opacity:1}100%{transform:translateY(155px);opacity:0}}@keyframes bounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-55px) scale(1.08)}}@keyframes rippleSvg{0%{transform:scale(.35);opacity:.8}100%{transform:scale(1.7);opacity:0}}@keyframes waveMove{50%{transform:translateX(35px)}}@keyframes splashRay{0%{transform:scale(.2) translateY(10px);opacity:1}100%{transform:scale(1.1) translateY(-30px);opacity:0}}
/* game effects */
.fxRain{position:absolute;top:-120px;width:8px;height:130px;background:#4ebbe5;border-radius:9px;opacity:.58;animation:fxRain .75s linear infinite}.fxRain.heavy{height:190px;width:11px;opacity:.7}.fxSlide{position:absolute;top:-120px;width:12px;height:150px;background:linear-gradient(#b8eeff,#35aad4);border-radius:18px;opacity:.75;animation:fxSlide 2s linear infinite}.fxStream{position:absolute;height:16px;border-top:8px solid #59bfe3;border-radius:50%;opacity:.6;animation:fxStream 1.8s ease-in-out infinite}.fxDrop{position:absolute;width:20px;height:26px;border-radius:50%;background:#4fc2eb;opacity:.8;animation:fxDrop 1s ease-in infinite}.fxBounce{position:absolute;width:25px;height:30px;border-radius:50%;background:#53c2e9;opacity:.85;animation:fxBounce 1.1s ease-in-out infinite}.fxRipple{position:absolute;border:6px solid #45b9e1;border-radius:50%;transform:translate(-50%,-50%);animation:fxRipple 1.4s ease-out forwards}.fxSplash{position:absolute;width:14px;height:50px;background:#45b9e1;border-radius:50%;left:50%;bottom:38%;animation:fxSplash 1s ease-out infinite}.fxWave{position:absolute;left:-15%;right:-15%;height:110px;border-top:20px solid #44b7df;border-radius:50%;opacity:.65;animation:fxWave 1.4s ease-in-out infinite}@keyframes fxRain{to{transform:translateY(900px)}}@keyframes fxSlide{to{transform:translateY(900px)}}@keyframes fxStream{50%{transform:translateX(28px)}}@keyframes fxDrop{0%{transform:translateY(-80px);opacity:0}25%{opacity:1}100%{transform:translateY(650px);opacity:0}}@keyframes fxBounce{50%{transform:translateY(-55px)}}@keyframes fxRipple{from{width:30px;height:18px;opacity:.95}to{width:360px;height:180px;opacity:0}}@keyframes fxSplash{to{transform:translate(var(--x),-170px) rotate(var(--r));opacity:0}}@keyframes fxWave{50%{transform:translateX(55px)}}

/* v3 compact no-scroll layout */
#app{height:100svh;padding:6px 10px 8px;gap:5px}
.brand .small{font-size:clamp(18px,4.2vw,30px)}.brand .title{font-size:clamp(34px,8vw,58px);text-shadow:0 7px 0 #fff}
.topbar{grid-template-columns:58px 64px 1fr 64px;gap:6px}.mini{min-height:54px;font-size:26px}.navBtn{min-height:62px;font-size:38px}.wordBox{font-size:clamp(28px,6.5vw,48px);padding:5px 4px;border-width:6px;border-radius:24px}
.panel{border-width:7px;border-radius:34px;padding:9px;gap:5px}.scene{min-height:125px;flex:0 0 36%;}.desc{font-size:clamp(16px,3.7vw,26px);line-height:1.12}.sentence{font-size:clamp(18px,4.4vw,31px);padding:7px 8px;border-radius:18px;line-height:1.12}.readBtn{display:block!important;min-height:48px;font-size:clamp(17px,4vw,28px);padding:4px 16px}.drawTip{font-size:clamp(13px,3.2vw,22px)}
.drawPanel{border-width:7px;border-radius:34px}.bottomBtns{gap:7px}.bottomBtns button{min-height:66px;font-size:clamp(20px,4.6vw,32px);padding:5px}.malangi{font-size:clamp(14px,3.2vw,22px);min-height:38px;border-width:5px}
/* finish feedback is voice-only */ .toast{display:none!important}
</style>
</head>
<body>
<div id="app">
  <div class="brand"><div class="small">수다쟁이여니쌤 그림책 놀이터</div><div class="title">쏴아아아</div></div>
  <section id="start" class="screen active center">
    <div class="sub">소리를 보고, 듣고, 손가락으로 그려요</div>
    <button class="bigBtn" id="learnStart">🔍 소리 궁금해</button>
    <button class="bigBtn" id="gameStart">🎨 게임 시작</button>
  </section>
  <section id="learn" class="screen" style="flex-direction:column;gap:8px">
    <div class="topbar"><button class="mini" id="homeLearn">🏠</button><button class="navBtn" id="prevLearn">◀</button><div id="learnWord" class="wordBox"></div><button class="navBtn" id="nextLearn">▶</button></div>
    <div class="panel"><div id="scene" class="scene"></div><div id="desc" class="desc"></div><div id="sentence" class="sentence"></div><button class="readBtn" id="readBtn">🔊 읽어주기</button><div id="drawTip" class="drawTip"></div><div class="learnBtns"><button class="btnGreen" id="toGame">게임 시작</button></div></div>
  </section>
  <section id="game" class="screen" style="flex-direction:column;gap:8px">
    <div class="topbar"><button class="mini" id="homeGame">🏠</button><button class="navBtn" id="prevSound">◀</button><div id="gameWord" class="wordBox"></div><button class="navBtn" id="nextSound">▶</button></div>
    <div style="display:flex;justify-content:flex-end;margin-top:-3px"><button class="malangi" id="malangi">말랑이 예시</button></div>
    <div class="drawPanel" id="drawPanel"><div id="fx" class="fx"></div><canvas id="canvas"></canvas><div class="placeholder">손가락으로 소리를 그려요</div><div id="example" class="example"><b>이렇게도 그릴 수 있어요</b><svg id="exsvg" class="exsvg" viewBox="0 0 500 260"></svg><div id="exampleText" class="exampleText"></div></div><div id="toast" class="toast"></div></div>
    <div class="bottomBtns"><button class="btnOrange" id="clearBtn">다시 그리기</button><button class="btnGreen" id="finishBtn">완성!</button><button class="btnPurple" id="moveBtn">움직이기</button></div>
  </section>
</div>
<script>
const sounds=[
 {w:'쏴아아아',d:'비가 아주 많이 내려요. 물이 한꺼번에 쏟아져요.',s:'비가 쏴아아아 내려요.',tip:'굵고 긴 빗줄기를 여러 개 그려 볼 수 있어요.',type:'rain'},
 {w:'주르륵',d:'물이 책상 끝이나 유리창을 따라 길게 흘러내려요.',s:'유리창에 빗물이 주르륵 흘러요.',tip:'위에서 아래로 미끄러지는 긴 물줄기를 그려 볼 수 있어요.',type:'slide'},
 {w:'졸졸졸',d:'얕은 시냇물이 돌 사이로 천천히 흘러가요.',s:'시냇물이 졸졸졸 흘러요.',tip:'작은 물결선을 옆으로 이어 그려 볼 수 있어요.',type:'stream'},
 {w:'톡톡',d:'물방울이 하나, 둘 떨어져 부딪혀요.',s:'수도꼭지에서 물이 톡톡 떨어져요.',tip:'작은 점이나 동그라미를 띄엄띄엄 그려 볼 수 있어요.',type:'drop'},
 {w:'통통',d:'물방울이 위아래로 가볍게 튀어요.',s:'물방울이 통통 튀어요.',tip:'튀어 오르는 동그라미와 짧은 선을 그려 볼 수 있어요.',type:'bounce'},
 {w:'풍덩',d:'큰 것이 물속으로 푹 빠져요.',s:'돌이 풍덩 물에 빠졌어요.',tip:'큰 물웅덩이와 동그란 파문을 그려 볼 수 있어요.',type:'plop'},
 {w:'첨벙',d:'물웅덩이를 밟자 물이 사방으로 튀어요.',s:'물웅덩이를 첨벙 밟았어요.',tip:'가운데에서 밖으로 튀는 선을 그려 볼 수 있어요.',type:'splash'},
 {w:'찰싹찰싹',d:'파도가 밀려와 바위나 모래에 부딪혀요.',s:'파도가 찰싹찰싹 밀려와요.',tip:'넓고 큰 파도 물결을 그려 볼 수 있어요.',type:'wave'}
];
let idx=0, mode='start', raf=null; const $=id=>document.getElementById(id);
function setScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');mode=id; if(id==='game')setTimeout(resizeCanvas,30)}
function goHome(){stopAnim();setScreen('start')} function showLearn(){idx=0;renderLearn();setScreen('learn')} function showGame(){renderGame();setScreen('game')}
function prevLearn(){idx=(idx+sounds.length-1)%sounds.length;renderLearn()} function nextLearn(){idx=(idx+1)%sounds.length;renderLearn()}
function prevSound(){idx=(idx+sounds.length-1)%sounds.length;renderGame();clearCanvas()} function nextSound(){idx=(idx+1)%sounds.length;renderGame();clearCanvas()}
function renderLearn(){let o=sounds[idx];$('learnWord').textContent=o.w;$('desc').textContent=o.d;$('sentence').textContent='“'+o.s+'”';$('drawTip').textContent='💡 '+o.tip;$('scene').innerHTML=sceneSVG(o.type)}
function renderGame(){let o=sounds[idx];$('gameWord').textContent=o.w;$('fx').innerHTML='';$('example').classList.remove('show');stopAnim()}
function speakCurrent(){let u=new SpeechSynthesisUtterance(sounds[idx].s);u.lang='ko-KR';u.rate=.72;u.pitch=1.05;speechSynthesis.cancel();speechSynthesis.speak(u)}
function sceneSVG(t){
 if(t==='rain')return `<svg viewBox="0 0 600 330"><rect width="600" height="330" fill="#f7fdff"/><g class="cloudBob"><ellipse cx="210" cy="70" rx="80" ry="42" fill="#80d2f0"/><ellipse cx="285" cy="70" rx="90" ry="50" fill="#80d2f0"/><ellipse cx="360" cy="75" rx="78" ry="40" fill="#80d2f0"/><rect x="180" y="70" width="250" height="55" rx="28" fill="#80d2f0"/></g>${Array.from({length:28},(_,i)=>`<line class="rainLine" x1="${45+i*20}" y1="${110-(i%5)*35}" x2="${35+i*20}" y2="${190-(i%5)*35}" stroke="#1e9fd0" stroke-width="7" stroke-linecap="round" opacity="${.45+(i%3)*.16}"/>`).join('')}<path d="M65 260 C170 230,255 286,360 255 S520 225,585 268" fill="none" stroke="#a9e4f7" stroke-width="16" stroke-linecap="round" opacity=".8"/></svg>`;
 if(t==='slide')return `<svg viewBox="0 0 600 330"><rect width="600" height="330" fill="#fffaf1"/><rect x="50" y="58" width="500" height="34" rx="17" fill="#bd8750"/><rect x="70" y="90" width="18" height="205" rx="9" fill="#a06d41"/><rect x="510" y="90" width="18" height="205" rx="9" fill="#a06d41"/><path d="M65 93 H530" stroke="#8c5f37" stroke-width="3" opacity=".35"/>${[135,225,325,425].map((x,i)=>`<g class="slideWater" style="animation-delay:${i*.32}s"><path d="M${x} 72 C${x-12} 120,${x+12} 165,${x-8} 220 C${x-24} 260,${x+15} 285,${x} 330" stroke="#4bb9df" stroke-width="15" fill="none" stroke-linecap="round" opacity=".72"/><circle cx="${x+7}" cy="190" r="7" fill="#9ee4f7" opacity=".9"/></g>`).join('')}<text x="300" y="310" text-anchor="middle" font-size="28" fill="#0d6380" font-weight="900">책상 끝으로 주르륵</text></svg>`;
 if(t==='stream')return `<svg viewBox="0 0 600 330"><rect width="600" height="330" fill="#f9fff7"/><circle cx="130" cy="210" r="28" fill="#c9c2a1"/><circle cx="430" cy="180" r="34" fill="#c9c2a1"/><circle cx="290" cy="235" r="23" fill="#c9c2a1"/><g class="streamMove"><path d="M-20 135 C80 85,150 190,260 135 S470 80,630 145" stroke="#4eb8df" stroke-width="26" fill="none" stroke-linecap="round" opacity=".75"/><path d="M-40 190 C75 150,160 245,285 190 S480 140,640 205" stroke="#8ed9ef" stroke-width="18" fill="none" stroke-linecap="round" opacity=".75"/></g></svg>`;
 if(t==='drop')return `<svg viewBox="0 0 600 330"><rect width="600" height="330" fill="#fbffff"/><path d="M300 40 h120 q20 0 20 20 v20" fill="none" stroke="#0d6380" stroke-width="16" stroke-linecap="round"/><path d="M438 78 q40 0 40 35" fill="none" stroke="#0d6380" stroke-width="14" stroke-linecap="round"/>${[0,1,2,3,4].map((_,i)=>`<ellipse class="dropFall" cx="460" cy="${110+i*35}" rx="12" ry="18" fill="#4fc2eb" opacity=".85" style="animation-delay:${i*.25}s"/>`).join('')}<ellipse cx="460" cy="285" rx="110" ry="20" fill="#bdeefa" opacity=".7"/></svg>`;
 if(t==='bounce')return `<svg viewBox="0 0 600 330"><rect width="600" height="330" fill="#fbffff"/><ellipse cx="300" cy="260" rx="160" ry="38" fill="#bceefa"/><circle cx="230" cy="240" r="16" fill="#53c2e9" class="bounceDrop"/><circle cx="300" cy="225" r="22" fill="#53c2e9" class="bounceDrop" style="animation-delay:.2s"/><circle cx="380" cy="245" r="14" fill="#53c2e9" class="bounceDrop" style="animation-delay:.4s"/><path d="M210 285 C280 260,330 260,400 285" stroke="#57c0e4" stroke-width="10" fill="none" stroke-linecap="round"/></svg>`;
 if(t==='plop')return `<svg viewBox="0 0 600 330"><rect width="600" height="330" fill="#fbffff"/><ellipse cx="300" cy="235" rx="190" ry="58" fill="#bdeefa"/><g transform="translate(300 235)"><ellipse class="rippleAnim" cx="0" cy="0" rx="60" ry="22" fill="none" stroke="#35acd6" stroke-width="8"/><ellipse class="rippleAnim" cx="0" cy="0" rx="100" ry="36" fill="none" stroke="#5cc6e9" stroke-width="6" style="animation-delay:.35s"/></g><circle cx="300" cy="120" r="36" fill="#7d8d96"><animate attributeName="cy" values="80;210;190" dur="1.3s" repeatCount="indefinite"/></circle></svg>`;
 if(t==='splash')return `<svg viewBox="0 0 600 330"><rect width="600" height="330" fill="#fbffff"/><ellipse cx="300" cy="260" rx="185" ry="42" fill="#bdeefa"/><g>${Array.from({length:16},(_,i)=>{let a=(i/15)*180;let x=300+Math.cos((200-a)*Math.PI/180)*120;let y=245-Math.sin(a*Math.PI/180)*90;return `<line class="splashRay" x1="300" y1="245" x2="${x}" y2="${y}" stroke="#37add7" stroke-width="8" stroke-linecap="round" style="animation-delay:${i*.04}s"/>`}).join('')}</g><path d="M250 250 Q300 210 350 250" fill="none" stroke="#0d6380" stroke-width="16" stroke-linecap="round"/></svg>`;
 return `<svg viewBox="0 0 600 330"><rect width="600" height="330" fill="#f9feff"/><g class="waveMove"><path d="M-60 190 C40 85,135 275,250 170 S430 75,660 185 L660 330 L-60 330 Z" fill="#4eb8df" opacity=".82"/><path d="M-60 230 C60 135,150 295,270 215 S455 145,660 220 L660 330 L-60 330 Z" fill="#8ed9ef" opacity=".72"/><path d="M60 160 C120 120,170 155,215 130" stroke="#fff" stroke-width="14" fill="none" stroke-linecap="round" opacity=".9"/></g><circle cx="455" cy="252" r="38" fill="#b99168" opacity=".8"/></svg>`;
}
function showExample(){let type=sounds[idx].type, ex=$('example'), svg=$('exsvg'), text=$('exampleText'); svg.innerHTML=exampleSVG(type); text.textContent='따라 그려도 좋고, 내 마음대로 그려도 좋아요.'; ex.classList.add('show'); setTimeout(()=>ex.classList.remove('show'),4300)}
function exampleSVG(t){ if(t==='rain')return `<g stroke="#1e9fd0" stroke-width="14" stroke-linecap="round" opacity=".55">${[80,150,230,310,390].map(x=>`<line x1="${x}" y1="30" x2="${x-35}" y2="230"/>`).join('')}</g>`;
 if(t==='slide')return `<g stroke="#1e9fd0" stroke-width="15" stroke-linecap="round" fill="none" opacity=".6"><path d="M150 20 C115 100 180 120 135 230"/><path d="M280 20 C245 105 315 130 270 235"/><path d="M390 30 C365 110 420 130 382 230"/></g>`;
 if(t==='stream')return `<g stroke="#1e9fd0" stroke-width="13" stroke-linecap="round" fill="none" opacity=".55"><path d="M20 90 C95 40 150 150 230 90 S370 50 480 115"/><path d="M10 165 C110 125 175 220 285 165 S405 120 500 185"/></g>`;
 if(t==='drop')return `<g fill="#1e9fd0" opacity=".55">${[[140,60],[250,110],[360,70],[210,185],[420,175]].map(p=>`<ellipse cx="${p[0]}" cy="${p[1]}" rx="16" ry="24"/>`).join('')}</g>`;
 if(t==='bounce')return `<g fill="none" stroke="#1e9fd0" stroke-width="11" stroke-linecap="round" opacity=".58"><path d="M110 205 Q160 70 210 205"/><path d="M245 205 Q300 40 355 205"/><path d="M370 210 Q410 105 455 210"/></g><g fill="#1e9fd0" opacity=".5"><circle cx="160" cy="120" r="18"/><circle cx="300" cy="75" r="20"/><circle cx="410" cy="130" r="16"/></g>`;
 if(t==='plop')return `<g fill="none" stroke="#1e9fd0" stroke-width="11" opacity=".55"><ellipse cx="250" cy="140" rx="65" ry="30"/><ellipse cx="250" cy="140" rx="125" ry="58"/><ellipse cx="250" cy="140" rx="190" ry="88"/></g>`;
 if(t==='splash')return `<g stroke="#1e9fd0" stroke-width="12" stroke-linecap="round" opacity=".55">${Array.from({length:12},(_,i)=>{let a=(-160+i*28)*Math.PI/180;return `<line x1="250" y1="200" x2="${250+Math.cos(a)*160}" y2="${200+Math.sin(a)*120}"/>`}).join('')}</g>`;
 return `<g stroke="#1e9fd0" stroke-width="17" stroke-linecap="round" fill="none" opacity=".55"><path d="M0 155 C80 50 155 245 250 140 S410 45 520 160"/><path d="M0 210 C95 115 170 280 275 205 S420 130 520 215"/></g>`; }
// canvas drawing
const c=$('canvas'), ctx=c.getContext('2d'); let drawing=false,last=null,strokes=[];
function resizeCanvas(){const r=c.getBoundingClientRect();c.width=Math.max(300,Math.floor(r.width*devicePixelRatio));c.height=Math.max(300,Math.floor(r.height*devicePixelRatio));ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);redraw()}
window.addEventListener('resize',()=>{if(mode==='game')resizeCanvas()});
function getPos(e){let p=e.touches?e.touches[0]:e;let r=c.getBoundingClientRect();return{x:p.clientX-r.left,y:p.clientY-r.top}}
function startDraw(e){e.preventDefault();c.setPointerCapture&&e.pointerId&&c.setPointerCapture(e.pointerId);drawing=true;last=getPos(e);strokes.push([last]);$('example').classList.remove('show')}
function moveDraw(e){if(!drawing)return;e.preventDefault();let p=getPos(e);drawSegment(last,p);last=p;strokes[strokes.length-1].push(p)}
function endDraw(e){drawing=false;last=null}
function drawSegment(a,b){ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='rgba(117,201,235,.55)';ctx.lineWidth=14;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();ctx.strokeStyle='#1592bf';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}
function redraw(ox=0,oy=0){let r=c.getBoundingClientRect();ctx.clearRect(0,0,r.width,r.height);strokes.forEach(st=>{for(let i=1;i<st.length;i++)drawSegment({x:st[i-1].x+ox,y:st[i-1].y+oy},{x:st[i].x+ox,y:st[i].y+oy})})}
['pointerdown','mousedown','touchstart'].forEach(ev=>c.addEventListener(ev,startDraw,{passive:false}));['pointermove','mousemove','touchmove'].forEach(ev=>c.addEventListener(ev,moveDraw,{passive:false}));['pointerup','pointercancel','mouseup','mouseleave','touchend','touchcancel'].forEach(ev=>c.addEventListener(ev,endDraw,{passive:false}));
function clearCanvas(){stopAnim();strokes=[];$('fx').innerHTML='';redraw();$('toast').classList.remove('show')}
function stopAnim(){if(raf)cancelAnimationFrame(raf);raf=null}
function finishDrawing(){animateDrawing();const o=sounds[idx];const msg={rain:'와! 비가 쏟아지는 느낌이 살아났어!',slide:'좋아! 물이 주르륵 미끄러져 내려가네!',stream:'멋져! 시냇물이 졸졸졸 흐르는 것 같아!',drop:'톡톡! 물방울이 하나씩 떨어지는 느낌이야!',bounce:'통통! 물방울이 튀어 오르는 것 같아!',plop:'풍덩! 물웅덩이에 빠진 느낌이 나!',splash:'첨벙! 물이 사방으로 튀었어!',wave:'찰싹찰싹! 파도가 밀려오는 것 같아!'};speakText(msg[o.type])}
function speakText(t){let u=new SpeechSynthesisUtterance(t);u.lang='ko-KR';u.rate=.78;u.pitch=1.08;speechSynthesis.cancel();speechSynthesis.speak(u)}
function showToast(t){speakText(t)}
function animateDrawing(){stopAnim();$('fx').innerHTML='';let t=sounds[idx].type;addEffects(t);let st=performance.now();function loop(now){let dt=(now-st)/1000, ox=0, oy=0;if(t==='rain')oy=(dt*70)%22;if(t==='slide')oy=(dt*38)%18;if(t==='stream')ox=Math.sin(dt*5)*9;if(t==='drop')oy=Math.sin(dt*8)*4;if(t==='bounce')oy=Math.sin(dt*7)*-12;if(t==='plop'||t==='splash'){ox=Math.sin(dt*9)*3;oy=Math.cos(dt*9)*3}if(t==='wave')ox=Math.sin(dt*4.5)*14;redraw(ox,oy);raf=requestAnimationFrame(loop)} raf=requestAnimationFrame(loop)}
function addDiv(cls,style){let e=document.createElement('div');e.className=cls;Object.assign(e.style,style||{});$('fx').appendChild(e);return e}
function addEffects(t){ if(t==='rain'){for(let i=0;i<36;i++)addDiv('fxRain '+(i%4===0?'heavy':''),{left:(Math.random()*100)+'%',animationDelay:(Math.random()*-1)+'s',animationDuration:(.55+Math.random()*.45)+'s'})}
 else if(t==='slide'){for(let i=0;i<9;i++)addDiv('fxSlide',{left:(18+i*8+Math.random()*4)+'%',animationDelay:(i*.23)+'s',animationDuration:(1.8+Math.random()*.5)+'s'})}
 else if(t==='stream'){for(let i=0;i<5;i++)addDiv('fxStream',{left:'-10%',right:'-10%',top:(30+i*11)+'%',animationDelay:(i*.22)+'s'})}
 else if(t==='drop'){for(let i=0;i<18;i++)addDiv('fxDrop',{left:(8+Math.random()*84)+'%',animationDelay:(i*.16)+'s'})}
 else if(t==='bounce'){for(let i=0;i<16;i++)addDiv('fxBounce',{left:(8+Math.random()*84)+'%',bottom:(15+Math.random()*45)+'%',animationDelay:(i*.08)+'s'})}
 else if(t==='plop'){for(let i=0;i<7;i++)addDiv('fxRipple',{left:'50%',top:'57%',animationDelay:(i*.22)+'s'})}
 else if(t==='splash'){for(let i=0;i<24;i++)addDiv('fxSplash',{'--x':(-220+i*19)+'px','--r':(-40+i*4)+'deg',animationDelay:(i*.025)+'s'})}
 else if(t==='wave'){addDiv('fxWave',{bottom:'20%'});addDiv('fxWave',{bottom:'8%',opacity:.42,animationDelay:'.3s'})}}
// buttons
$('learnStart').onclick=showLearn;$('gameStart').onclick=showGame;$('homeLearn').onclick=goHome;$('homeGame').onclick=goHome;$('prevLearn').onclick=prevLearn;$('nextLearn').onclick=nextLearn;$('prevSound').onclick=prevSound;$('nextSound').onclick=nextSound;$('readBtn').onclick=speakCurrent;$('toGame').onclick=showGame;$('malangi').onclick=showExample;$('clearBtn').onclick=clearCanvas;$('finishBtn').onclick=finishDrawing;$('moveBtn').onclick=animateDrawing;
renderLearn();renderGame();
